<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA V | Global Interactive Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* GTA V Style Palette */
        :root {
            --gta-bg: #0b0b0b;
            --gta-card: #1a1a1a;
            --gta-accent: #fbc02d; /* Gold-Gelb */
            --gta-text: #ffffff;
            --gta-text-dim: #bbbbbb;
            --gta-danger: #ff5252;
            --gta-border: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0fa8d2; /* Wasser-Blau */
            color: var(--gta-text);
            overflow: hidden;
        }

        /* Navigation Bar */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(11, 11, 11, 0.95);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 2px solid var(--gta-accent);
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .logo span { color: var(--gta-accent); }

        .nav-controls { display: flex; align-items: center; gap: 15px; }

        .admin-tools {
            display: none; /* Nur für Admins sichtbar */
            background: var(--gta-card);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid var(--gta-border);
            gap: 10px;
            align-items: center;
        }

        /* Buttons & Inputs */
        button, select {
            background: #222;
            color: white;
            border: 1px solid var(--gta-border);
            padding: 8px 15px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { border-color: var(--gta-accent); background: #333; }
        
        .login-btn { border-color: var(--gta-accent); color: var(--gta-accent); }
        .login-btn.active { border-color: var(--gta-danger); color: var(--gta-danger); }

        /* Map Container */
        #map {
            width: 100%;
            height: 100vh
