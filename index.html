<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA V Map UI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#0b0b0b;
    --panel:#111;
    --accent:#fbc02d;
    --text:#fff;
    --border:#2a2a2a;
}

body, html { margin:0; padding:0; height:100%; font-family:'Orbitron', sans-serif; background:#000; }
#map { width:100%; height:100vh; }

/* NAVBAR */
.navbar {
    position:absolute; top:0; left:0; right:0;
    height:60px; background:rgba(0,0,0,0.9);
    color:white; display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; z-index:1000;
    border-bottom:2px solid var(--accent);
}

.logo { font-weight:700; letter-spacing:2px; }
.logo span { color:var(--accent); }

.admin-tools { display:none; gap:10px; }

input, select, button {
    background:#111; color:white; border:1px solid var(--border);
    padding:6px 10px; border-radius:4px;
}
button:hover { border-color:var(--accent); }

/* SIDE PANEL */
#panel {
    position:absolute;
    top:70px;
    left:10px;
    width:200px;
    background:rgba(0,0,0,0.85);
    border:1px solid var(--border);
    border-radius:8px;
    padding:15px;
    z-index:1000;
}

#panel h3 { margin-top:0; font-size:14px; color:var(--accent); }

#panel label {
    display:block;
    margin-bottom:8px;
    font-size:12px;
}

/* LEGEND */
.legend {
    margin-top:15px;
    font-size:12px;
}

.legend div {
    display:flex; align-items:center; margin-bottom:5px;
}

.legend img { width:16px; margin-right:8px; }

</style>
</head>
<body>

<div class="navbar">
    <div class="logo">GTA <span>MAP</span></div>

    <div>
        <input type="password" id="password" placeholder="Admin">
        <button id="loginBtn">Login</button>

        <div class="admin-tools" id="adminTools">
            <select id="category">
                <option value="Anwesen">Anwesen</option>
                <option value="Dächer">Dächer</option>
                <option value="Wichtige Punkte">Wichtige Punkte</option>
            </select>

            <input type="color" id="color" value="#ff0000">
            <button id="addMarker">+</button>
        </div>
    </div>
</div>

<div id="panel">
    <h3>Suche</h3>
    <input type="text" id="search" placeholder="Name suchen..." style="width:100%; margin-bottom:10px;">

    <h3>Filter</h3>
    <label><input type="checkbox" value="Anwesen" checked> Anwesen</label>
    <label><input type="checkbox" value="Dächer" checked> Dächer</label>
    <label><input type="checkbox" value="Wichtige Punkte" checked> Wichtige Punkte</label>

    <div class="legend">
        <h3>Legende</h3>
        <div><img src="https://cdn-icons-png.flaticon.com/512/69/69524.png"> Anwesen</div>
        <div><img src="https://cdn-icons-png.flaticon.com/512/619/619153.png"> Dächer</div>
        <div><img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"> Punkte</div>
    </div>
</div>
        <div><img src="https://cdn-icons-png.flaticon.com/512/619/619153.png"> Dächer</div>
        <div><img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"> Punkte</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">// Suche Event
document.getElementById('search').addEventListener('input', ()=>{
    // löst redraw via onSnapshot automatisch aus
});

</script>
<script src="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.css" />

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4VbebyKbjlTtaMuDsszvsqnIcDWkku8o",
  authDomain: "gta-map-58133.firebaseapp.com",
  projectId: "gta-map-58133",
  storageBucket: "gta-map-58133.firebasestorage.app",
  messagingSenderId: "822163180944",
  appId: "1:822163180944:web:6843108ee088c9fe553715"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "12345";
let isAdmin = false;

document.getElementById("loginBtn").onclick = () => {
    if (document.getElementById("password").value === ADMIN_PASSWORD) {
        isAdmin = true;
        document.getElementById("adminTools").style.display = "flex";
    }
};

const map = L.map('map', { crs: L.CRS.Simple, minZoom:-2 });
const bounds = [[0,0],[8192,8192]];
const image = L.imageOverlay("https://i.imgur.com/Ex4R7nR.jpg", bounds).addTo(map);
map.fitBounds(bounds);

new L.Control.MiniMap(image).addTo(map);

let layer = L.layerGroup().addTo(map);

function icon(cat){
    if(cat==="Anwesen") return "https://cdn-icons-png.flaticon.com/512/69/69524.png";
    if(cat==="Dächer") return "https://cdn-icons-png.flaticon.com/512/619/619153.png";
    return "https://cdn-icons-png.flaticon.com/512/684/684908.png";
}

function filters(){
    return Array.from(document.querySelectorAll('#panel input[type=checkbox]:checked')).map(x=>x.value);
}

function searchTerm(){
    return document.getElementById('search').value.toLowerCase();
}

onSnapshot(collection(db,"markers"),(snap)=>{
    layer.clearLayers();
    const active = filters();
    const search = searchTerm();

    snap.forEach(docSnap=>{
        const d = docSnap.data();

        if(!active.includes(d.category)) return;
        if(search && !d.name.toLowerCase().includes(search)) return;

        L.marker([d.y,d.x],{icon:L.icon({iconUrl:icon(d.category),iconSize:[25,25]})})
        .addTo(layer)
        .bindPopup(`<b>${d.name}</b><br>${d.category}<br>${isAdmin?`<button onclick="editMarker('${docSnap.id}','${d.name}')">✏️</button><button onclick="deleteMarker('${docSnap.id}')">🗑️</button>`:""}`);
    });
});
});

window.deleteMarker = async (id)=>{ if(isAdmin) await deleteDoc(doc(db,"markers",id)); };
window.editMarker = async (id,name)=>{
    if(!isAdmin) return;
    const n = prompt("Neuer Name",name);
    if(n) await updateDoc(doc(db,"markers",id),{name:n});
};

document.getElementById("addMarker").onclick = ()=>{
    if(!isAdmin) return;
    map.once("click",async e=>{
        const name = prompt("Name");
        if(!name) return;

        await addDoc(collection(db,"markers"),{
            name,
            category:document.getElementById("category").value,
            color:document.getElementById("color").value,
            x:e.latlng.lng,
            y:e.latlng.lat
        });
    });
};

</script>
</body>
</html>
