<!DOCTYPE html>
<html>
<head>
  <title>GTA V Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="panel">
  <h3>🗺️ GTA Map</h3>

  <input type="text" id="search" placeholder="🔍 Suche...">

  <div class="filters">
    <label><input type="checkbox" value="Anwesen" checked> 🟥 Anwesen</label>
    <label><input type="checkbox" value="Dächer" checked> 🟦 Dächer</label>
    <label><input type="checkbox" value="Punkte" checked> 🟩 Punkte</label>
  </div>

  <div class="legend">
    <div><span class="box red"></span> Anwesen</div>
    <div><span class="box blue"></span> Dächer</div>
    <div><span class="box green"></span> Punkte</div>
  </div>

  <div class="buttons">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="app.js"></script>

</body>
</html>
